    <g clip-path="url(#iconClipDock)">
      <g transform="rotate(7 512 512)">
        <text
          x="512"
          y="1080"
          text-anchor="middle"
          font-size="820"
          font-weight="800"
          font-family="Nunito, Arial Rounded MT Bold, Helvetica Rounded, Arial, sans-serif"
          letter-spacing="-28"
          fill="#111111">
          24
        </text>
      </g>
    </g>
  </g>
</svg>
